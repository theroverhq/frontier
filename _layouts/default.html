<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">
    <meta name="keywords" content="Agentic SIEM, Agentic SecOps, Rover SIEM, S3 SIEM, S3 indices, adaptive detections, signals to cases, security search, SIEM cost reduction, autonomous triage, detection engineering, threat hunting">
    <link rel="canonical" href="https://roverhq.ai{{ page.url | replace: 'index.html', '' }}">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://roverhq.ai{{ page.url | replace: 'index.html', '' }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description }}">
    <meta property="og:image" content="{{ page.og_image }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://roverhq.ai{{ page.url | replace: 'index.html', '' }}">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="{{ page.description }}">
    <meta name="twitter:image" content="{{ page.og_image }}">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Rover",
        "operatingSystem": "Cloud-native",
        "applicationCategory": "SecurityApplication",
        "description": "Agentic SIEM with adaptive detections, signals-to-cases investigation, agent-assisted SecOps, S3-native search, S3-hosted indices, autonomous triage, and incident response readiness.",
        "offers": {
            "@type": "Offer",
            "priceCurrency": "USD",
            "availability": "https://schema.org/PreOrder"
        }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Absolute path for layout.css from root -->
    <link rel="stylesheet" href="/layout.css">

    <!-- Favicon Links -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
</head>
<body>
    <nav class="nav" aria-label="Main navigation">
        <div class="shell nav-inner">
            <a href="/" class="brand" aria-label="Rover home">
                <span class="brand-mark">R</span>
                <span>Rover</span>
            </a>

            <div class="nav-links" aria-label="Page sections">
                <a href="/#siem">Agentic SIEM</a>
                <a href="/#agents">Agentic SecOps</a>
                <a href="/#architecture">S3 Search</a>
                <a href="/#outcomes">Outcomes</a>
                <a href="/blogs/the-agentic-database-wall.html">Blogs</a>
            </div>

            <div class="nav-actions">
                <a class="button secondary" href="/#architecture">See Search</a>
                <a class="button primary" href="/#early-access">Get Access</a>
            </div>
        </div>
    </nav>

    {{ content }}

    <footer class="footer">
        <div class="shell footer-inner">
            <div>&copy; 2026 Rover HQ Inc.</div>
            <div class="footer-links">
                <a href="mailto:contactus@roverhq.ai">contactus@roverhq.ai</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="/blogs/the-agentic-database-wall.html">Blogs</a>
            </div>
        </div>
    </footer>

    <!-- Absolute path for site.js from root -->
    <script src="/site.js"></script>
</body>
</html>
